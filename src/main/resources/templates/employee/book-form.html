<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:replace="~{fragments/base :: layout(~{::title}, ~{::content})}">
<head>
    <title th:text="${editMode} ? #{employee.bookform.edit} : #{employee.bookform.new}">Book form</title>
</head>
<body>
<main th:fragment="content">
    <div class="container">
        <p class="page-sub"><a th:href="@{/app/employee/books}" th:text="#{employee.books.back}">← Books</a></p>
        <h1 class="page-title" th:text="${editMode} ? #{employee.bookform.edit} : #{employee.bookform.new}">Form</h1>
        <form class="form-grid wide" th:object="${bookForm}" th:action="@{/app/employee/books/save}" method="post">
            <input type="hidden" name="originalName" th:value="${originalName}" th:if="${editMode}">
            <div>
                <label for="name" th:text="#{book.field.name}">Name</label>
                <input id="name" type="text" th:field="*{name}" required>
                <p class="field-error" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></p>
            </div>
            <div>
                <label for="genre" th:text="#{book.field.genre}">Genre</label>
                <input id="genre" type="text" th:field="*{genre}" required>
                <p class="field-error" th:if="${#fields.hasErrors('genre')}" th:errors="*{genre}"></p>
            </div>
            <div>
                <label for="ageGroup" th:text="#{book.field.age}">Age</label>
                <select id="ageGroup" th:field="*{ageGroup}" required>
                    <option th:each="g : ${T(com.spring.project.model.enums.AgeGroup).values()}"
                            th:value="${g}" th:text="${g}"></option>
                </select>
            </div>
            <div>
                <label for="price" th:text="#{book.field.price}">Price</label>
                <input id="price" type="number" step="0.01" min="0.01" th:field="*{price}" required>
                <p class="field-error" th:if="${#fields.hasErrors('price')}" th:errors="*{price}"></p>
            </div>
            <div>
                <label for="publicationDate" th:text="#{book.field.published}">Published</label>
                <input id="publicationDate" type="date" th:field="*{publicationDate}" required>
                <p class="field-error" th:if="${#fields.hasErrors('publicationDate')}" th:errors="*{publicationDate}"></p>
            </div>
            <div>
                <label for="author" th:text="#{book.field.author}">Author</label>
                <input id="author" type="text" th:field="*{author}" required>
                <p class="field-error" th:if="${#fields.hasErrors('author')}" th:errors="*{author}"></p>
            </div>
            <div>
                <label for="pages" th:text="#{book.field.pages}">Pages</label>
                <input id="pages" type="number" min="1" th:field="*{pages}" required>
                <p class="field-error" th:if="${#fields.hasErrors('pages')}" th:errors="*{pages}"></p>
            </div>
            <div>
                <label for="characteristics" th:text="#{book.field.characteristics}">Characteristics</label>
                <input id="characteristics" type="text" th:field="*{characteristics}">
            </div>
            <div>
                <label for="description" th:text="#{book.field.description}">Description</label>
                <textarea id="description" th:field="*{description}" required></textarea>
                <p class="field-error" th:if="${#fields.hasErrors('description')}" th:errors="*{description}"></p>
            </div>
            <div>
                <label for="language" th:text="#{book.field.language}">Language</label>
                <select id="language" th:field="*{language}" required>
                    <option th:each="lang : ${T(com.spring.project.model.enums.Language).values()}"
                            th:value="${lang}" th:text="${lang}"></option>
                </select>
            </div>
            <div class="btn-row">
                <button type="submit" class="btn btn-primary" th:text="#{common.save}">Save</button>
                <a class="btn btn-secondary" th:href="@{/app/employee/books}" th:text="#{common.cancel}">Cancel</a>
            </div>
        </form>
    </div>
</main>
</body>
</html>
