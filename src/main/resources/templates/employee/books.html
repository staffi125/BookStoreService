<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:replace="~{fragments/base :: layout(~{::title}, ~{::content})}">
<head>
    <title th:text="#{employee.books.title}">Books</title>
</head>
<body>
<main th:fragment="content">
    <div class="container">
        <h1 class="page-title" th:text="#{employee.books.title}">Book inventory</h1>
        <p class="page-sub">
            <a th:href="@{/app/employee}" th:text="#{employee.back_dashboard}">← Dashboard</a>
            ·
            <a class="btn btn-primary" style="display:inline-flex;margin-left:0.5rem" th:href="@{/app/employee/books/new}" th:text="#{employee.books.new}">New book</a>
        </p>

        <form class="book-toolbar" th:action="@{/app/employee/books}" method="get">
            <div class="book-toolbar-row">
                <label class="sr-only" for="emp-book-q" th:text="#{books.search.placeholder}">Search</label>
                <input id="emp-book-q" type="search" name="q" th:value="${q}"
                       th:placeholder="#{books.search.placeholder}" class="book-search-input">
                <input type="hidden" name="page" value="0">
                <button type="submit" class="btn btn-primary" th:text="#{books.search.submit}">Apply</button>
            </div>
            <div class="book-toolbar-split" role="group" th:aria-label="#{books.filter.numeric_group}">
                <div class="book-toolbar-half">
                    <span class="book-toolbar-field-label" th:text="#{books.filter.pages}">Pages</span>
                    <div class="book-toolbar-pair">
                        <input type="number" name="minPages" min="0" th:value="${minPages}"
                               th:placeholder="#{books.filter.min}" class="book-search-input book-search-input--narrow" inputmode="numeric">
                        <input type="number" name="maxPages" min="0" th:value="${maxPages}"
                               th:placeholder="#{books.filter.max}" class="book-search-input book-search-input--narrow" inputmode="numeric">
                    </div>
                </div>
                <div class="book-toolbar-half">
                    <span class="book-toolbar-field-label" th:text="#{books.filter.price}">Price</span>
                    <div class="book-toolbar-pair">
                        <input type="number" name="minPrice" min="0" step="0.01" th:value="${minPrice}"
                               th:placeholder="#{books.filter.min}" class="book-search-input book-search-input--narrow" inputmode="decimal">
                        <input type="number" name="maxPrice" min="0" step="0.01" th:value="${maxPrice}"
                               th:placeholder="#{books.filter.max}" class="book-search-input book-search-input--narrow" inputmode="decimal">
                    </div>
                </div>
            </div>
        </form>

        <p class="meta book-page-meta" th:if="${bookPage.totalElements > 0}"
           th:text="#{books.page.status(${bookPage.number + 1}, ${bookPage.totalPages}, ${bookPage.totalElements})}">Page</p>
        <p class="meta" th:if="${bookPage.totalElements == 0}" th:text="#{books.search.empty}">No books</p>

        <div class="table-wrap" th:if="${bookPage.totalElements > 0}">
            <table class="data">
                <thead>
                <tr>
                    <th th:text="#{employee.books.col_name}">Name</th>
                    <th th:text="#{employee.books.col_genre}">Genre</th>
                    <th th:text="#{employee.books.col_price}">Price</th>
                    <th></th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="b : ${bookPage.content}">
                    <td th:text="${b.name}">Name</td>
                    <td th:text="${b.genre}">Genre</td>
                    <td th:text="${b.price}">0</td>
                    <td>
                        <div class="btn-row">
                            <a class="btn btn-secondary" style="font-size:0.85rem;padding:0.35rem 0.75rem"
                               th:href="@{/app/employee/books/edit(name=${b.name})}" th:text="#{common.edit}">Edit</a>
                            <form class="inline-form" th:action="@{/app/employee/books/delete}" method="post"
                                  onsubmit="return confirm(this.dataset.msg);"
                                  th:attr="data-msg=#{employee.books.delete_confirm}">
                                <input type="hidden" name="name" th:value="${b.name}">
                                <button type="submit" class="btn btn-danger" style="font-size:0.85rem;padding:0.35rem 0.75rem"
                                        th:text="#{common.delete}">Delete</button>
                            </form>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>

        <nav class="pager" th:if="${bookPage.totalPages > 1}">
            <a class="btn btn-secondary"
               th:if="${bookPage.hasPrevious()}"
               th:href="@{/app/employee/books(q=${q},page=${bookPage.number - 1},minPrice=${minPrice},maxPrice=${maxPrice},minPages=${minPages},maxPages=${maxPages})}"
               th:text="#{books.page.prev}">Prev</a>
            <span class="pager-gap" th:text="#{books.page.indicator(${bookPage.number + 1}, ${bookPage.totalPages})}">1 / 3</span>
            <a class="btn btn-secondary"
               th:if="${bookPage.hasNext()}"
               th:href="@{/app/employee/books(q=${q},page=${bookPage.number + 1},minPrice=${minPrice},maxPrice=${maxPrice},minPages=${minPages},maxPages=${maxPages})}"
               th:text="#{books.page.next}">Next</a>
        </nav>
    </div>
</main>
</body>
</html>
