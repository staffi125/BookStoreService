<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:replace="~{fragments/base :: layout(~{::title}, ~{::content})}">
<head>
    <title th:text="#{register.title}">Register</title>
</head>
<body>
<main th:fragment="content">
    <div class="auth-panel">
        <div class="auth-card">
            <h1 th:text="#{register.title}">Create account</h1>
            <p class="sub" th:text="#{register.subtitle}">Join as a client to shop the catalog.</p>
            <form class="form-grid" th:action="@{/app/register}" th:object="${registerForm}" method="post">
                <div th:if="${#fields.hasGlobalErrors()}" class="global-error" th:text="#{register.duplicate}"></div>
                <div>
                    <label for="email" th:text="#{register.email}">Email</label>
                    <input id="email" type="email" th:field="*{email}" required>
                    <p class="field-error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></p>
                </div>
                <div>
                    <label for="password" th:text="#{register.password}">Password</label>
                    <input id="password" type="password" th:field="*{password}" required autocomplete="new-password">
                    <p class="field-error" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></p>
                </div>
                <div>
                    <label for="name" th:text="#{register.name}">Name</label>
                    <input id="name" type="text" th:field="*{name}" required>
                    <p class="field-error" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></p>
                </div>
                <input type="hidden" th:field="*{balance}" />
                <button type="submit" class="btn btn-primary" th:text="#{register.submit}">Create</button>
            </form>
            <p style="margin-top:1.25rem;color:var(--muted);font-size:0.9rem">
                <a th:href="@{/login}" th:text="#{register.have_account}">Already registered?</a>
            </p>
        </div>
    </div>
</main>
</body>
</html>
