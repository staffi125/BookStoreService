<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:fragment="layout (pageTitle, content)"
      th:lang="${#locale.language}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="_csrf" th:content="${_csrf.token}" th:if="${_csrf}">
    <meta name="_csrf_header" th:content="${_csrf.headerName}" th:if="${_csrf}">
    <meta name="_csrf_parameter" th:content="${_csrf.parameterName}" th:if="${_csrf}">
    <title th:replace="${pageTitle}">Book Store</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,500&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="site-body">
<div class="site-bg" aria-hidden="true"></div>
<header class="site-header">
    <div class="header-inner">
        <a class="brand" th:href="@{/}">
            <span class="brand-mark" aria-hidden="true"></span>
            <span class="brand-text" th:text="#{app.brand}">Book Loft</span>
        </a>
        <nav class="nav" id="site-nav">
            <a th:href="@{/}" th:text="#{nav.home}">Home</a>
            <a sec:authorize="isAuthenticated()" th:href="@{/app/books}" th:text="#{nav.catalog}">Catalog</a>
            <a sec:authorize="hasRole('CLIENT')" th:href="@{/app/basket}" id="nav-basket-link">
                <span th:text="#{nav.basket}">Basket</span>
                <span id="basket-count" class="basket-badge" hidden
                      th:attr="data-label-template=#{nav.basket.count}"></span>
            </a>
            <a sec:authorize="hasRole('EMPLOYEE')" th:href="@{/app/employee}" th:text="#{nav.staff}">Staff</a>
            <a sec:authorize="isAuthenticated()" th:href="@{/app/profile}" th:text="#{nav.profile}">Profile</a>
        </nav>
        <div class="header-actions">
            <div class="lang-switch">
                <a th:href="@{/switch-locale(lang=en)}">EN</a>
                <span>·</span>
                <a th:href="@{/switch-locale(lang=uk)}">UK</a>
            </div>
            <a sec:authorize="!isAuthenticated()" class="btn btn-secondary" th:href="@{/login}" th:text="#{nav.login}">Log in</a>
            <a sec:authorize="!isAuthenticated()" class="btn btn-primary" th:href="@{/app/register}" th:text="#{nav.register}">Register</a>
            <form sec:authorize="isAuthenticated()" class="inline-form" th:action="@{/logout}" method="post">
                <th:block th:replace="~{fragments/csrf :: token}"/>
                <button type="submit" class="btn btn-ghost" th:text="#{nav.logout}">Log out</button>
            </form>
        </div>
    </div>
</header>
<div id="toast-root" class="toast-root" aria-live="polite" aria-atomic="true"></div>
<div th:if="${flashSuccess}" id="flash-success" class="u-hidden" th:text="#{__${flashSuccess}__}"></div>
<div th:if="${flashError}" id="flash-error" class="u-hidden" th:text="#{__${flashError}__}"></div>
<main th:replace="${content}">
</main>
<footer class="site-footer">
    <div class="footer-inner">
        <p class="footer-brand" th:text="#{app.brand}">Book Loft</p>
        <p class="footer-copy" th:text="#{app.footer}">Footer</p>
    </div>
</footer>
<script th:src="@{/js/app.js}" defer></script>
</body>
</html>
