<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:replace="~{fragments/base :: layout(~{::title}, ~{::content})}">
<head>
    <title th:text="${book.name}">Book</title>
</head>
<body>
<main th:fragment="content" class="page-book-detail">
    <div class="container">
        <a class="back-link" th:href="@{/app/books}" th:text="#{books.back_catalog}">Catalog</a>

        <div class="detail-hero">
            <div class="detail-cover" aria-hidden="true"></div>
            <div class="detail-intro">
                <h1 class="page-title" th:text="${book.name}">Title</h1>
                <p class="page-sub" th:text="|${book.author} · ${book.publicationDate}|">Meta</p>
                <div class="detail-chips">
                    <span class="chip" th:text="${book.genre}">Genre</span>
                    <span class="chip" th:text="${book.language}">Lang</span>
                    <span class="chip" th:text="${book.ageGroup}">Age</span>
                </div>
            </div>
        </div>

        <div class="detail-layout">
            <article class="detail-body">
                <p class="prose" th:text="${book.description}">Description</p>
                <div th:if="${book.characteristics}" class="detail-highlight">
                    <strong th:text="#{books.characteristics}">Highlights</strong>
                    <span th:text="${book.characteristics}"></span>
                </div>
            </article>
            <aside class="detail-aside">
                <div class="aside-price" th:text="|${book.price} #{books.currency}|">0</div>
                <div class="detail-meta-list">
                    <div class="meta"><span th:text="#{books.pages}">Pages</span><span th:text="${book.pages}">0</span></div>
                    <div class="meta"><span th:text="#{books.age}">Age</span><span th:text="${book.ageGroup}">—</span></div>
                    <div class="meta"><span th:text="#{books.language}">Language</span><span th:text="${book.language}">—</span></div>
                </div>
                <form sec:authorize="hasRole('CLIENT')" class="form-grid js-basket-add"
                      th:action="@{/app/basket/add}" method="post"
                      th:attr="data-success-message=#{basket.added},data-error-message=#{js.basket.error}">
                    <th:block th:replace="~{fragments/csrf :: token}"/>
                    <input type="hidden" name="bookName" th:value="${book.name}">
                    <div>
                        <label for="qty" th:text="#{books.quantity}">Quantity</label>
                        <input id="qty" type="number" name="quantity" value="1" min="1" max="99">
                    </div>
                    <button type="submit" class="btn btn-primary btn-block" th:text="#{books.add_basket}">Add to basket</button>
                </form>
                <p sec:authorize="hasRole('EMPLOYEE')" class="meta" th:text="#{books.employee_hint}">Clients add books to their basket.</p>
            </aside>
        </div>
    </div>
</main>
</body>
</html>
